<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parquímetro Virtual</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>Parquímetro Virtual</h1>
            <p>Insira o valor para calcular o tempo de permanência.</p>
        </header>

        <section class="info-precos">
            <h2>Tabela de Preços</h2>
            <ul>
                <li><strong>R$ 1,00</strong> - 30 minutos</li>
                <li><strong>R$ 1,75</strong> - 60 minutos</li>
                <li><strong>R$ 3,00</strong> - 120 minutos (Máximo)</li>
            </ul>
        </section>

        <section class="interacao-usuario">
            <form id="form-parquimetro">
                <div class="input-group">
                    <label for="valor-inserido">Valor Inserido (R$):</label>
                    <input type="number" id="valor-inserido" step="0.01" min="0" placeholder="Ex: 2.50" required>
                </div>
                <button type="submit">Calcular Ticket</button>
            </form>
        </section>

        <section id="area-resultado" class="resultado oculta" aria-live="polite">
        </section>
    </main>

    <script src="scripts.js"></script>
</body>
</html>
